<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - CourseApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 16px;
            overflow: hidden;
        }
        .card-header-gradient {
            background: linear-gradient(90deg, #0052D4 0%, #4364F7 50%, #6FB1FC 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(67, 100, 247, 0.1);
            border-color: #4364F7;
        }
        .btn-login {
            background: #4364F7;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #0052D4;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 82, 212, 0.2);
        }
        .alert {
            border-radius: 10px;
            font-size: 0.85rem;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center px-3">
        <div class="card login-card shadow-lg">
            <div class="card-header-gradient">
                <h2 class="fw-bold m-0">Đăng Nhập</h2>
                <p class="small m-0 opacity-75 mt-1">Chào mừng bạn trở lại với CourseApp</p>
            </div>

            <div class="card-body p-4 p-md-5 bg-white">
                
                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
                    <span>❌ Sai tên đăng nhập hoặc mật khẩu!</span>
                </div>
                
                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center mb-3" role="alert">
                    <span>✅ Bạn đã đăng xuất thành công.</span>
                </div>
                
                <div th:if="${param.registered}" class="alert alert-primary d-flex align-items-center mb-3" role="alert">
                    <span>🎉 Đăng ký thành công! Mời bạn đăng nhập.</span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-dark small">Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" placeholder="Username" required autofocus />
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-login text-white">Đăng nhập</button>
                    </div>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">
                            Chưa có tài khoản? 
                            <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">Đăng ký ngay</a>
                        </p>
                    </div>
                </form>
            </div>
            
            <div class="card-footer bg-light border-0 py-3 text-center">
                <a th:href="@{/home}" class="text-muted small text-decoration-none">← Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
