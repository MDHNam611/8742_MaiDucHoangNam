<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý học phần - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .navbar { background: linear-gradient(90deg, #0052D4 0%, #4364F7 50%, #6FB1FC 100%) !important; }
        .admin-card { background: white; border-radius: 15px; border: none; overflow: hidden; }
        .table thead { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        .btn-add { border-radius: 10px; font-weight: 600; padding: 10px 20px; transition: all 0.3s; }
        .btn-action { border-radius: 8px; padding: 5px 12px; font-size: 0.85rem; font-weight: 600; }
        .badge-category { background-color: #e7f0ff; color: #4364F7; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">📚 CourseApp <small class="fw-normal opacity-75">| ADMIN</small></a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link btn btn-light text-dark btn-sm px-3" th:href="@{/home}" style="border-radius: 20px;">
                            🏠 Về Trang Chủ
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0">Quản lý học phần</h2>
                <p class="text-muted m-0">Danh sách toàn bộ học phần trong hệ thống</p>
            </div>
            <a th:href="@{/admin/courses/add}" class="btn btn-primary btn-add shadow-sm text-white">
                + Thêm học phần mới
            </a>
        </div>

        <div class="card admin-card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4 py-3 text-uppercase small fw-bold text-muted">ID</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Tên học phần</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted text-center">Tín chỉ</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Giảng viên</th>
                            <th class="py-3 text-uppercase small fw-bold text-muted">Danh mục</th>
                            <th class="pe-4 py-3 text-uppercase small fw-bold text-muted text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course : ${courses}">
                            <td class="ps-4 fw-bold text-muted" th:text="${course.id}"></td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${course.name}"></div>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-light text-dark border px-3 py-2" th:text="${course.credits}"></span>
                            </td>
                            <td class="text-muted" th:text="${course.lecturer}"></td>
                            <td>
                                <span class="badge badge-category px-3 py-2" 
                                      th:text="${course.category != null ? course.category.name : 'Chưa phân loại'}">
                                </span>
                            </td>
                            <td class="pe-4 text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" 
                                       class="btn btn-warning btn-action text-dark shadow-sm">Sửa</a>
                                    
                                    <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" 
                                       class="btn btn-danger btn-action text-white shadow-sm"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này?');">Xóa</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courses)}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <i>Chưa có học phần nào trong cơ sở dữ liệu.</i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a th:href="@{/home}" class="text-muted small text-decoration-none">← Quay lại Trang chủ người dùng</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
