<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý học phần - CourseApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .navbar { background: linear-gradient(90deg, #0052D4 0%, #4364F7 50%, #6FB1FC 100%) !important; }
        .form-card { background: white; border-radius: 15px; border: none; }
        .form-label { font-weight: 600; color: #495057; }
        .image-preview-box { border: 2px dashed #dee2e6; border-radius: 10px; padding: 10px; background: #f8f9fa; display: inline-block; }
        .btn-save { background: #4364F7; border: none; border-radius: 8px; font-weight: 600; padding: 10px 25px; transition: all 0.3s; }
        .btn-save:hover { background: #0052D4; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 82, 212, 0.2); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/home}">📚 CourseApp <small class="fw-normal opacity-75">| ADMIN</small></a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="mb-3">
                    <a th:href="@{/admin/courses}" class="text-decoration-none text-muted small">← Quay lại danh sách</a>
                </div>

                <div class="card form-card shadow-sm p-4 p-md-5">
                    <h2 class="fw-bold text-dark mb-4 text-center" 
                        th:text="${course.id == null ? 'Thêm học phần mới' : 'Cập nhật học phần'}"></h2>
                    
                    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Tên học phần</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: Lập trình Java Cơ Bản" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hình ảnh (Chọn file từ máy tính)</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*" />
                            
                            <div th:if="${course.image != null and course.image != ''}" class="mt-3">
                                <p class="small text-muted mb-2">Ảnh hiện tại:</p>
                                <div class="image-preview-box text-center">
                                    <img th:src="${course.image}" class="rounded shadow-sm" style="max-width: 200px; height: auto;" alt="Current Image" />
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Số tín chỉ</label>
                                <input type="number" th:field="*{credits}" class="form-control" placeholder="Nhập số tín chỉ" required />
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Danh mục</label>
                                <select th:field="*{category}" class="form-select">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Giảng viên phụ trách</label>
                            <input type="text" th:field="*{lecturer}" class="form-control" placeholder="Tên giảng viên" required />
                        </div>

                        <div class="d-flex gap-2 justify-content-end mt-4">
                            <a th:href="@{/admin/courses}" class="btn btn-outline-secondary px-4 py-2" style="border-radius: 8px;">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary btn-save px-5 text-white">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
